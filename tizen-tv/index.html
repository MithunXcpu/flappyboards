<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlappyBoards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: monospace;
            font-size: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Loading FlappyBoards...</div>
    <iframe id="app" src="https://flappyboards-ten.vercel.app/display"
            allow="autoplay; fullscreen; web-share"
            allowfullscreen
            onload="document.getElementById('loading').style.display='none'">
    </iframe>
    <script>
        // Handle TV remote back button
        document.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 10009: // Samsung TV back button
                    try { tizen.application.getCurrentApplication().exit(); } catch(ex) { window.close(); }
                    break;
                case 10182: // Samsung TV exit button
                    try { tizen.application.getCurrentApplication().exit(); } catch(ex) { window.close(); }
                    break;
            }
        });

        // Keep screen on
        try {
            if (typeof webapis !== 'undefined' && webapis.appcommon) {
                webapis.appcommon.setScreenSaver(webapis.appcommon.AppCommonScreenSaverState.SCREEN_SAVER_OFF);
            }
        } catch(e) { console.log('Screen saver control not available'); }
    </script>
</body>
</html>
